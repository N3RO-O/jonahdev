<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 — Not Found · jonah.dev</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' fill='%2306080b'/><text x='4' y='24' font-family='monospace' font-size='20' font-weight='700' fill='%23e8b84b'>J</text></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@300;400;500;700&family=Roboto:wght@300;400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg:     #06080b;
      --bg1:    #0c0e13;
      --bg3:    #161920;
      --border: #1a1e28;
      --green:  #e8b84b;
      --white:  #edeef0;
      --g1:     #c4c8ce;
      --g2:     #858c96;
      --g3:     #484e58;
      --g4:     #252930;
      --mono:   'Roboto Mono', monospace;
      --sans:   'Roboto', sans-serif;
    }

    html, body {
      height: 100%; background: var(--bg);
      color: var(--white); font-family: var(--mono);
      overflow: hidden; cursor: none;
    }

    /* Mesh background */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background:
        radial-gradient(ellipse 60% 50% at 8%  15%, rgba(232,184,75,.028), transparent),
        radial-gradient(ellipse 50% 60% at 92% 80%, rgba(123,175,212,.022), transparent),
        radial-gradient(ellipse 40% 40% at 55% 45%, rgba(88,101,242,.018),  transparent);
      pointer-events: none; z-index: 0;
    }

    /* Grain */
    body::after {
      content: '';
      position: fixed; inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='1'/%3E%3C/svg%3E");
      background-size: 200px 200px; opacity: .032;
      pointer-events: none; z-index: 9001;
    }

    /* Cursor */
    .cursor {
      width: 2px; height: 18px; background: var(--green);
      position: fixed; pointer-events: none; z-index: 9998;
      transform: translate(-50%,-50%);
      animation: blink 1.1s step-end infinite;
      box-shadow: 0 0 5px rgba(232,184,75,.45); opacity: .88;
    }
    @keyframes blink { 0%,100%{opacity:.88} 50%{opacity:0} }

    /* Layout */
    .wrapper {
      position: relative; z-index: 1;
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      padding: 40px 24px;
    }

    /* Terminal window */
    .terminal {
      width: 100%; max-width: 580px;
      background: rgba(12,14,19,.75);
      backdrop-filter: blur(18px) saturate(1.3);
      border: 1px solid rgba(255,255,255,.07);
      box-shadow: 0 24px 80px rgba(0,0,0,.6), 0 0 0 1px rgba(232,184,75,.04) inset;
      animation: slideUp .5s cubic-bezier(.4,0,.2,1) forwards;
    }
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .terminal-bar {
      padding: 11px 16px; border-bottom: 1px solid rgba(255,255,255,.05);
      display: flex; align-items: center; gap: 7px;
      background: rgba(255,255,255,.025);
    }
    .t-dot { width: 11px; height: 11px; border-radius: 50%; }
    .t-dot.r { background: #ff5f57; }
    .t-dot.y { background: #febc2e; }
    .t-dot.g { background: #28c840; }
    .t-title { font-size: 10px; color: var(--g3); margin-left: auto; letter-spacing: .12em; }

    .terminal-body { padding: 28px 28px 24px; }

    /* Error lines */
    .err-code {
      font-size: clamp(64px, 16vw, 96px);
      font-weight: 700; letter-spacing: -4px; line-height: 1;
      color: var(--green);
      text-shadow: 0 0 60px rgba(232,184,75,.18);
      margin-bottom: 4px;
      animation: fadeUp .4s ease .15s both;
    }

    .err-lines { margin-bottom: 28px; display: flex; flex-direction: column; gap: 6px; }
    .err-line  { display: flex; gap: 10px; font-size: 13px; line-height: 1.7; }
    .err-line  { animation: fadeUp .4s ease both; }
    .err-line:nth-child(1) { animation-delay: .2s; }
    .err-line:nth-child(2) { animation-delay: .3s; }
    .err-line:nth-child(3) { animation-delay: .4s; }
    .err-line:nth-child(4) { animation-delay: .5s; }
    .err-line:nth-child(5) { animation-delay: .6s; }

    .ps1  { color: #d4a43e; opacity: .8; flex-shrink: 0; }
    .cmd  { color: var(--white); }
    .out  { color: var(--g2); padding-left: 18px; }
    .err  { color: #e06c6c; padding-left: 18px; }
    .dim  { color: var(--g3); }
    .hi   { color: var(--green); }

    /* Divider */
    .t-divider {
      border: none; border-top: 1px solid var(--border);
      margin: 20px 0; animation: fadeUp .4s ease .65s both;
    }

    /* Actions */
    .actions {
      display: flex; gap: 10px; flex-wrap: wrap;
      animation: fadeUp .4s ease .72s both;
    }
    .btn {
      font-family: var(--mono); font-size: 11px; letter-spacing: .12em;
      padding: 10px 20px; text-decoration: none; cursor: none;
      transition: all .2s; border: 1px solid transparent;
      display: inline-block;
    }
    .btn-primary {
      background: var(--green); color: #0a0b0d; font-weight: 700;
      border-color: var(--green);
    }
    .btn-primary:hover { background: #f0c85a; transform: translateY(-1px); }
    .btn-ghost {
      background: transparent; color: var(--g2); border-color: var(--border);
    }
    .btn-ghost:hover { color: var(--white); border-color: rgba(255,255,255,.15); background: rgba(255,255,255,.03); transform: translateY(-1px); }

    /* Blinking cursor at prompt */
    .t-cursor {
      display: inline-block; width: 5px; height: 14px;
      background: var(--green); opacity: .85;
      animation: blink 1.1s step-end infinite; vertical-align: middle;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Grid bg behind everything */
    .page-grid {
      position: fixed; inset: 0; pointer-events: none; z-index: 0;
      background-image: radial-gradient(circle, rgba(232,184,75,.07) 1px, transparent 1px);
      background-size: 34px 34px;
      mask-image: radial-gradient(ellipse 70% 70% at 50% 50%, black 20%, transparent 100%);
      -webkit-mask-image: radial-gradient(ellipse 70% 70% at 50% 50%, black 20%, transparent 100%);
      opacity: .2;
    }

    @media (max-width: 480px) {
      .terminal-body { padding: 20px; }
      .actions { flex-direction: column; }
      .btn { text-align: center; }
    }
  </style>
</head>
<body>

  <div class="cursor" id="cursor404"></div>
  <div class="page-grid" aria-hidden="true"></div>

  <div class="wrapper">
    <div class="terminal">
      <div class="terminal-bar">
        <div class="t-dot r"></div>
        <div class="t-dot y"></div>
        <div class="t-dot g"></div>
        <span class="t-title">bash — jonah.dev</span>
      </div>

      <div class="terminal-body">
        <div class="err-code">404</div>

        <div class="err-lines">
          <div class="err-line"><span class="ps1">~$</span><span class="cmd"> cd <span class="hi">"{{ requested_path }}"</span></span></div>
          <div class="err-line"><span class="err">bash: cd: {{ requested_path }}: No such file or directory</span></div>
          <div class="err-line"><span class="ps1">~$</span><span class="cmd"> ls -la</span></div>
          <div class="err-line"><span class="out"><span class="dim">drwxr-xr-x</span>  work/&nbsp;&nbsp;&nbsp;&nbsp;about/&nbsp;&nbsp;&nbsp;experience/</span></div>
          <div class="err-line"><span class="out"><span class="dim">drwxr-xr-x</span>  blog/&nbsp;&nbsp;&nbsp;&nbsp;contact/&nbsp;&nbsp;<span class="hi">← try these</span></span></div>
        </div>

        <hr class="t-divider">

        <div class="actions">
          <a href="/" class="btn btn-primary">cd ~/home</a>
          <a href="/#work" class="btn btn-ghost">./view_work</a>
          <a href="/#contact" class="btn btn-ghost">./contact_me</a>
        </div>

        <div style="margin-top:20px; font-size:11px; color:var(--g3); animation: fadeUp .4s ease .8s both; display:block;">
          <span class="ps1">~$</span> <span class="t-cursor"></span>
        </div>
      </div>
    </div>
  </div>

  <script>
    // Show actual path in error message
    const path = window.location.pathname || '/???';
    document.querySelectorAll('.hi').forEach(el => {
      if (el.textContent.includes('{{ requested_path }}')) el.textContent = path;
    });
    document.querySelectorAll('.err').forEach(el => {
      el.textContent = el.textContent.replace(/\{\{ requested_path \}\}/g, path);
    });

    // Custom cursor
    const cur = document.getElementById('cursor404');
    if (cur && window.innerWidth > 768) {
      document.addEventListener('mousemove', e => {
        cur.style.left = e.clientX + 'px';
        cur.style.top  = e.clientY + 'px';
      });
    } else if (cur) {
      cur.style.display = 'none';
    }
  </script>
</body>
</html>
